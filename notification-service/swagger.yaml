openapi: 3.0.3
info:
  title: UrBus Notification Service API
  description: |
    Microservicio de notificaciones vía WhatsApp para la plataforma UrBus.
    Utiliza whatsapp-web.js para enviar mensajes a números individuales y grupos.

    ## Autenticación
    Todos los endpoints requieren JWT Bearer token (compartido con el Auth Service).

    ## Roles
    - "ADMIN_ROLE" / "DRIVER_ROLE": pueden enviar mensajes a grupos de WhatsApp y listar grupos
    - Cualquier usuario autenticado: puede enviar mensajes a números individuales

    ## Formato de número
    - Números individuales: se aceptan con o sin código de país. Si no inicia con 502 (Guatemala), se agrega automáticamente.
    - Grupos: se identifican por su ID serializado terminado en "@g.us"

    ## Estado de WhatsApp
    Si el cliente de WhatsApp no está listo (pendiente de escanear QR o desconectado), todos los endpoints de envío retornan error 500.
  version: 1.0.0

servers:
  - url: http://localhost:{port}/urbus/v1
    description: Local development
    variables:
      port:
        default: '5000'

tags:
  - name: Notifications
    description: Envío de notificaciones por WhatsApp
  - name: WhatsApp
    description: Gestión del cliente WhatsApp
  - name: Health
    description: Estado del servicio

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Servicio saludable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  service:
                    type: string
                    example: UrBus Notification Service

  /notifications/arrival:
    post:
      tags:
        - Notifications
      summary: Notificar llegada del bus
      operationId: sendArrival
      description: |
        Envía el mensaje: "El bus {busName} está por llegar."
        - Números individuales: cualquier usuario autenticado
        - Grupos (terminan en "@g.us"): solo ADMIN_ROLE o DRIVER_ROLE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArrivalRequest'
      responses:
        '200':
          $ref: '#/components/responses/NotificationSent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /notifications/delay:
    post:
      tags:
        - Notifications
      summary: Notificar retraso del bus
      operationId: sendDelay
      description: |
        Envía el mensaje: "El bus {busName} tiene {minutes} minutos de atraso."
        - Números individuales: cualquier usuario autenticado
        - Grupos (terminan en "@g.us"): solo ADMIN_ROLE o DRIVER_ROLE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DelayRequest'
      responses:
        '200':
          $ref: '#/components/responses/NotificationSent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /notifications/route-change:
    post:
      tags:
        - Notifications
      summary: Notificar cambio de ruta
      operationId: sendRouteChange
      description: |
        Envía el mensaje: "El bus {busName} ha cambiado su ruta."
        - Números individuales: cualquier usuario autenticado
        - Grupos (terminan en "@g.us"): solo ADMIN_ROLE o DRIVER_ROLE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArrivalRequest'
            example:
              number: "55123456"
              busName: "Ruta 12"
      responses:
        '200':
          $ref: '#/components/responses/NotificationSent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /notifications/custom:
    post:
      tags:
        - Notifications
      summary: Enviar notificación personalizada
      operationId: sendCustom
      description: |
        Envía un mensaje personalizado a un número o grupo.
        - Números individuales: cualquier usuario autenticado
        - Grupos (terminan en "@g.us"): solo ADMIN_ROLE o DRIVER_ROLE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomRequest'
      responses:
        '200':
          $ref: '#/components/responses/NotificationSent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /notifications/groups:
    get:
      tags:
        - WhatsApp
      summary: Listar grupos de WhatsApp
      operationId: getWhatsAppGroups
      description: Retorna todos los grupos de WhatsApp disponibles en la sesión activa. Solo ADMIN_ROLE o DRIVER_ROLE.
      responses:
        '200':
          description: Lista de grupos
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  groups:
                    type: array
                    items:
                      $ref: '#/components/schemas/WhatsAppGroup'
              example:
                success: true
                groups:
                  - name: Ruta 42 Pasajeros
                    id: 120363000000000000@g.us
                  - name: Conductores UrBus
                    id: 120363000000000001@g.us
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT emitido por el Auth Service

  schemas:
    ArrivalRequest:
      type: object
      required:
        - number
        - busName
      properties:
        number:
          type: string
          description: |
            Número de WhatsApp del destinatario o ID de grupo.
            - Individual: número con o sin código de país (502 se agrega automáticamente)
            - Grupo: ID serializado terminado en "@g.us"
          example: "55123456"
        busName:
          type: string
          description: Nombre o identificador del bus
          example: "Ruta 42"

    DelayRequest:
      type: object
      required:
        - number
        - busName
        - minutes
      properties:
        number:
          type: string
          description: Número de WhatsApp del destinatario o ID de grupo
          example: "55123456"
        busName:
          type: string
          description: Nombre o identificador del bus
          example: "Ruta 42"
        minutes:
          type: integer
          description: Minutos de retraso
          example: 15

    CustomRequest:
      type: object
      required:
        - number
        - message
      properties:
        number:
          type: string
          description: Número de WhatsApp del destinatario o ID de grupo
          example: "55123456"
        message:
          type: string
          description: Mensaje personalizado a enviar
          example: "El bus saldrá desde una parada diferente hoy."

    WhatsAppGroup:
      type: object
      properties:
        name:
          type: string
          description: Nombre del grupo
          example: Ruta 42 Pasajeros
        id:
          type: string
          description: ID serializado del grupo (usar como "number" para enviar mensajes al grupo)
          example: 120363000000000000@g.us

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error:
          type: string
          nullable: true

  responses:
    NotificationSent:
      description: Notificación enviada correctamente
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
          examples:
            arrival:
              value:
                success: true
                message: Notificación de llegada enviada
            delay:
              value:
                success: true
                message: Notificación de retraso enviada
            routeChange:
              value:
                success: true
                message: Notificación de cambio de ruta enviada
            custom:
              value:
                success: true
                message: Notificación personalizada enviada

    BadRequest:
      description: Campos requeridos faltantes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missingFields:
              value:
                success: false
                message: El número y el nombre del autobús son obligatorios
            missingCustom:
              value:
                success: false
                message: Se requieren número y mensaje

    Unauthorized:
      description: Token ausente o inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missing:
              value:
                success: false
                message: No token provided
            invalid:
              value:
                success: false
                message: Invalid token

    Forbidden:
      description: Sin permisos para enviar a grupos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Solo los administradores y conductores pueden enviar mensajes a grupos

    InternalError:
      description: Error interno o WhatsApp no disponible
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
          examples:
            whatsappNotReady:
              value:
                error: WhatsApp is not ready yet
            whatsappNotInit:
              value:
                error: WhatsApp client not initialized